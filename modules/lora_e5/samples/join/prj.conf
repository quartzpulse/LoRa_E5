CONFIG_LORA_E5=y
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
# ESP32's UART async backend is DMA-backed (GDMA) -- the module Kconfig
# only depends on UART_ASYNC_API generically (not chip-specific), so
# this board-specific requirement is set here, not in modules/lora_e5/Kconfig.
CONFIG_DMA=y
CONFIG_GPIO=y
CONFIG_LOG=y
