CONFIG_LORA_E5=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_GPIO=y
CONFIG_LOG=y

# Deep sleep -- see docs/Device_State_Machine.md's "Architecture" section
# and external/zephyr/samples/boards/espressif/deep_sleep, which this
# sample's sleep/wake/retained-mem handling is modeled on.
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y
CONFIG_RETAINED_MEM=y

# Workaround: this Zephyr tree's soc/espressif/common/power.c (built
# whenever CONFIG_PM=y) does LOG_MODULE_DECLARE(soc, ...) but no
# espressif SoC file provides the matching LOG_MODULE_REGISTER(soc,
# ...) -- with CONFIG_LOG=y (needed for our own and lora_e5's logging)
# this is an undefined-reference link failure (`log_const_soc`),
# reproduced even on the unmodified upstream
# samples/boards/espressif/deep_sleep with CONFIG_LOG=y added. Forcing
# this module's own log level off avoids emitting the dangling
# reference without touching vendored Zephyr/HAL sources.
CONFIG_SOC_LOG_LEVEL_OFF=y

# NVS-backed persistent settings for OTAA/ABP credentials + region
# (config/settings_lorawan.yaml, generated by scripts/gen_settings_module.py
# -- see scripts/README.md). Uses esp32s3_devkitc's existing "storage"
# devicetree partition automatically (Zephyr's settings_nvs backend
# falls back to a partition literally labeled storage_partition when no
# zephyr,settings-partition chosen node is set -- confirmed present in
# espressif/partitions_0x0_amp_4M.dtsi, no board overlay change needed).
# CONFIG_FLASH=y and CONFIG_FLASH_MAP=y are required too, undocumented
# by the trio above but confirmed by an actual build: CONFIG_NVS
# depends on FLASH + FLASH_PAGE_LAYOUT, and CONFIG_SETTINGS_NVS
# separately depends on FLASH_MAP -- none of which any other symbol
# here pulls in on its own. Without both, Kconfig silently drops the
# NVS backend choice back to SETTINGS_NONE (a dependency warning, not
# a hard build error) and settings_load()/settings_save_one() end up
# with nothing actually persisting.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Confirmed needed on real hardware: settings_subsys_init() failed with
# -EDEADLK ("all sectors closed, this is not a nvs fs or irreparably
# corrupted", subsys/kvss/nvs/nvs.c) on this board's first-ever use of
# the "storage" partition -- its flash contents predate this sample and
# aren't a blank/erased NVS filesystem. This is Zephyr's own sanctioned
# self-heal for exactly that case (auto-erases and creates a fresh NVS
# instead of failing) rather than a one-off manual flash-erase
# workaround, so it also protects any future device whose flash isn't
# blank at first flash.
CONFIG_NVS_INIT_BAD_MEMORY_REGION=y
